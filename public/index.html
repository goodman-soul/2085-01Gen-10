<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小区鲜奶取货柜系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .login-card { max-width: 420px; margin: 80px auto; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .role-btn { transition: all 0.2s; border: 2px solid #e9ecef; }
    .role-btn.active { border-color: #667eea; background-color: #f0f4ff; }
    .hero-icon { font-size: 64px; color: #667eea; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card login-card p-4">
      <div class="text-center mb-4">
        <div class="hero-icon">🥛</div>
        <h2 class="mt-2 fw-bold">小区鲜奶取货柜</h2>
        <p class="text-muted">智能配送 · 新鲜直达</p>
      </div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">选择身份</label>
          <div class="d-flex gap-2">
            <button type="button" class="btn role-btn flex-fill active" data-role="delivery">
              <div>📦</div><small>配送员</small>
            </button>
            <button type="button" class="btn role-btn flex-fill" data-role="resident">
              <div>🏠</div><small>住户</small>
            </button>
            <button type="button" class="btn role-btn flex-fill" data-role="property">
              <div>🏢</div><small>物业</small>
            </button>
          </div>
          <input type="hidden" id="roleInput" value="delivery">
        </div>
        <div class="mb-3">
          <label class="form-label">用户名</label>
          <input type="text" id="username" class="form-control form-control-lg" placeholder="请输入用户名" required>
        </div>
        <div class="mb-4">
          <label class="form-label">密码</label>
          <input type="password" id="password" class="form-control form-control-lg" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100" style="background: linear-gradient(135deg, #667eea, #764ba2); border: none;">登 录</button>
      </form>
      <div class="mt-4 p-3 bg-light rounded small">
        <div class="fw-bold mb-2">测试账号：</div>
        <div>配送员：delivery1 / 123456</div>
        <div>住户：resident1 / 123456</div>
        <div>物业：property1 / 123456</div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('roleInput').value = btn.dataset.role;
      });
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('roleInput').value;
      
      const result = await api.login(username, password);
      if (result.success) {
        if (result.user.role !== role) {
          alert('该账号身份与选择不符');
          return;
        }
        localStorage.setItem('user', JSON.stringify(result.user));
        window.location.href = 'dashboard.html';
      } else {
        alert(result.message || '登录失败');
      }
    });
  </script>
</body>
</html>
